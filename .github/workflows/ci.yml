name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify root module context
        run: |
          set -euo pipefail
          gomod="$(go env GOMOD)"
          echo "GOMOD=${gomod}"
          test "${gomod}" = "${GITHUB_WORKSPACE}/go.mod"

      - name: Check formatting
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l $(find cmd internal -name '*.go' -type f))"
          if [ -n "${unformatted}" ]; then
            echo "These files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build -o /tmp/pwned ./cmd/pwned
