name: Release

on:
  push:
    tags:
      - "*"
      - "**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            arch_label: amd64
          - goos: linux
            goarch: arm64
            arch_label: aarch64
          - goos: darwin
            goarch: amd64
            arch_label: amd64
          - goos: darwin
            goarch: arm64
            arch_label: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify root module context
        run: |
          set -euo pipefail
          gomod="$(go env GOMOD)"
          echo "GOMOD=${gomod}"
          test "${gomod}" = "${GITHUB_WORKSPACE}/go.mod"

      - name: Build binary
        run: |
          set -euo pipefail
          mkdir -p dist
          name="pwned-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.arch_label }}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "dist/${name}" ./cmd/pwned
          chmod +x "dist/${name}"
          shasum -a 256 "dist/${name}" > "dist/${name}.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.arch_label }}
          path: |
            dist/pwned-*

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pwned-*
          generate_release_notes: true
          fail_on_unmatched_files: true
